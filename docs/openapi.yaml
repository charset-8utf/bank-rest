openapi: 3.1.0
info:
  title: API управления банковскими картами
  description: REST API для управления банковскими картами с JWT-аутентификацией и ролевой моделью ADMIN / USER. Номера карт хранятся в зашифрованном виде (AES-256-GCM), в ответах возвращается маска вида **** **** **** 1234.
  version: "1.0"
servers:
  - url: "http://localhost:8080"
    description: Generated server url
tags:
  - name: Admin — Пользователи
    description: Управление пользователями (только ADMIN)
  - name: Карты
    description: Операции с картами для авторизованного пользователя
  - name: Аутентификация
    description: Регистрация и вход
  - name: Admin — Карты
    description: Управление картами (только ADMIN)
  - name: Профиль
    description: Управление профилем текущего пользователя
paths:
  /api/users/profile:
    get:
      tags:
        - Профиль
      summary: Получить свой профиль
      operationId: getMyProfile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UserProfileResponse"
      security:
        - bearerAuth: []
    put:
      tags:
        - Профиль
      summary: Обновить свой профиль
      operationId: updateMyProfile
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UserProfileRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UserProfileResponse"
      security:
        - bearerAuth: []
  /api/cards/{id}/block:
    put:
      tags:
        - Карты
      summary: Запросить блокировку своей карты
      operationId: requestBlock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: No Content
      security:
        - bearerAuth: []
  /api/admin/cards/{id}/block:
    put:
      tags:
        - Admin — Карты
      summary: Заблокировать карту
      operationId: blockCard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CardResponse"
      security:
        - bearerAuth: []
  /api/admin/cards/{id}/activate:
    put:
      tags:
        - Admin — Карты
      summary: Активировать карту
      operationId: activateCard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CardResponse"
      security:
        - bearerAuth: []
  /api/cards/transfer:
    post:
      tags:
        - Карты
      summary: Перевод средств между своими картами
      operationId: transfer
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TransferRequest"
        required: true
      responses:
        "204":
          description: No Content
      security:
        - bearerAuth: []
  /api/auth/register:
    post:
      tags:
        - Аутентификация
      summary: Зарегистрировать нового пользователя
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AuthResponse"
  /api/auth/login:
    post:
      tags:
        - Аутентификация
      summary: Войти и получить JWT-токен
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AuthResponse"
  /api/admin/cards:
    get:
      tags:
        - Admin — Карты
      summary: Получить все карты (с пагинацией, опциональный фильтр по статусу)
      operationId: getAllCards
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - ACTIVE
              - BLOCKED
              - EXPIRED
        - name: pageable
          in: query
          required: true
          schema:
            "$ref": "#/components/schemas/Pageable"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PageResponseCardResponse"
      security:
        - bearerAuth: []
    post:
      tags:
        - Admin — Карты
      summary: Создать карту для пользователя
      operationId: createCard
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CardCreateRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CardResponse"
      security:
        - bearerAuth: []
  /api/cards:
    get:
      tags:
        - Карты
      summary: Получить свои карты (с пагинацией, опциональный фильтр по статусу)
      operationId: getMyCards
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - ACTIVE
              - BLOCKED
              - EXPIRED
        - name: pageable
          in: query
          required: true
          schema:
            "$ref": "#/components/schemas/Pageable"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PageResponseCardResponse"
      security:
        - bearerAuth: []
  /api/cards/{id}/transactions:
    get:
      tags:
        - Карты
      summary: История транзакций по своей карте (с пагинацией)
      operationId: getCardTransactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: pageable
          in: query
          required: true
          schema:
            "$ref": "#/components/schemas/Pageable"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PageResponseTransactionResponse"
      security:
        - bearerAuth: []
  /api/admin/users:
    get:
      tags:
        - Admin — Пользователи
      summary: Получить всех пользователей (с пагинацией)
      operationId: getAllUsers
      parameters:
        - name: pageable
          in: query
          required: true
          schema:
            "$ref": "#/components/schemas/Pageable"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PageResponseUserResponse"
      security:
        - bearerAuth: []
  /api/admin/users/{id}:
    get:
      tags:
        - Admin — Пользователи
      summary: Получить пользователя по ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UserResponse"
      security:
        - bearerAuth: []
    delete:
      tags:
        - Admin — Пользователи
      summary: Удалить пользователя по ID
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: No Content
      security:
        - bearerAuth: []
  /api/admin/cards/{id}:
    delete:
      tags:
        - Admin — Карты
      summary: Удалить карту
      operationId: deleteCard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: No Content
      security:
        - bearerAuth: []
components:
  schemas:
    UserProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          maxLength: 64
          minLength: 0
        lastName:
          type: string
          maxLength: 64
          minLength: 0
        phone:
          type: string
          pattern: ^\+?[0-9 \-()]{7,20}$
    UserProfileResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
    CardResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        maskedCardNumber:
          type: string
        ownerUsername:
          type: string
        expiryDate:
          type: string
          format: date
        status:
          type: string
          enum:
            - ACTIVE
            - BLOCKED
            - EXPIRED
        balance:
          type: number
        createdAt:
          type: string
          format: date-time
    TransferRequest:
      type: object
      properties:
        fromCardId:
          type: integer
          format: int64
        toCardId:
          type: integer
          format: int64
        amount:
          type: number
          minimum: 0.01
      required:
        - amount
        - fromCardId
        - toCardId
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          maxLength: 64
          minLength: 3
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          maxLength: 128
          minLength: 6
      required:
        - email
        - password
        - username
    AuthResponse:
      type: object
      properties:
        token:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
        - password
        - username
    CardCreateRequest:
      type: object
      properties:
        ownerId:
          type: integer
          format: int64
        cardNumber:
          type: string
          minLength: 1
          pattern: \d{16}
        expiryDate:
          type: string
          format: date
      required:
        - cardNumber
        - expiryDate
        - ownerId
    Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        sort:
          type: array
          items:
            type: string
    PageResponseCardResponse:
      type: object
      properties:
        content:
          type: array
          items:
            "$ref": "#/components/schemas/CardResponse"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        last:
          type: boolean
    PageResponseTransactionResponse:
      type: object
      properties:
        content:
          type: array
          items:
            "$ref": "#/components/schemas/TransactionResponse"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        last:
          type: boolean
    TransactionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        fromCardId:
          type: integer
          format: int64
        fromCardMasked:
          type: string
        toCardId:
          type: integer
          format: int64
        toCardMasked:
          type: string
        amount:
          type: number
        description:
          type: string
        createdAt:
          type: string
          format: date-time
    PageResponseUserResponse:
      type: object
      properties:
        content:
          type: array
          items:
            "$ref": "#/components/schemas/UserResponse"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        last:
          type: boolean
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
          uniqueItems: true
        createdAt:
          type: string
          format: date-time
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
